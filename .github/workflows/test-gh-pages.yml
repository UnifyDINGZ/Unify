name: Test Product Page (Build)

on:
  pull_request:
    branches:
      - master
    paths:
      - frontend/

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/

    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: npm i

      - name: Build files
        run: npm run build
