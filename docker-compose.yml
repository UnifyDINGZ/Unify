services:
  s3:
    image: minio/minio:latest
    volumes:
      - minio_data:/data
    secrets:
      - minio-credentials
    networks:
      - backend
    environment:
      MINIO_CONFIG_ENV_FILE: /run/secrets/minio-credentials
      MINIO_CONSOLE_ADDRESS: ":9001"
      MINIO_BROWSER_REDIRECT_URL: "http://s3-console.unify.com"
    command: server /data

  db:
    image: postgres:18-alpine
    volumes:
      - db_data:/var/lib/postgresql
    env_file:
      - secrets/pg.env
    # secrets:
    #   - db-pass
    #   - db-user
    networks:
      - backend
    # environment:
    #   POSTGRES_PASSWORD_FILE: /run/secrets/db-pass
    #   POSTGRES_USER_FILE: /run/secrets/db-user


  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - s3
    networks:
      - backend

volumes:
  minio_data:
  db_data:

secrets:
  minio-credentials:
    file: secrets/minio.env
  # db-pass:
  #   file: secrets/postgres-pass
  # db-user:
  #   file: secrets/postgres-user

networks:
  backend:
    driver: bridge
