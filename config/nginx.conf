worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Disable file size limits for uploads
    client_max_body_size 0;
    proxy_buffering off;
    proxy_request_buffering off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 1. MinIO S3 API Proxy
    server {
        listen 80;
        server_name storage.unify.com;

        location / {
            proxy_pass http://s3:9000;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Fixes AWS S3 V4 Signature issues
            proxy_connect_timeout 300;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            chunked_transfer_encoding off;
        }
    }

    # 2. MinIO Web Console Proxy
    server {
        listen 80;
        server_name s3-console.unify.com;

        location / {
            proxy_pass http://s3:9001;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Support WebSockets for the MinIO console terminal/logs
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    #    server {
    #      listen 80;
    #      server_name api.unify.com;
